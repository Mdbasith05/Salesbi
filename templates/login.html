<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SalesBI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#07090f;--card:#0f1320;--border:rgba(255,255,255,0.07);--blue:#1a73e8;--green:#34a853;--text:#e8edf5;--muted:#6b7280;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;overflow:hidden;}

/* Animated bg orbs */
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.12;animation:pulse 6s ease-in-out infinite;}
.o1{width:600px;height:600px;background:#1a73e8;top:-150px;left:-150px;animation-delay:0s;}
.o2{width:500px;height:500px;background:#34a853;bottom:-150px;right:-100px;animation-delay:-3s;}
.o3{width:300px;height:300px;background:#a142f4;top:50%;left:40%;animation-delay:-5s;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

/* Grid */
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;}

/* Left */
.left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative;z-index:1;}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:70px;animation:up 0.8s ease both;}
.brand-ic{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#1a73e8,#34a853);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 8px 30px rgba(26,115,232,0.35);}
.brand-nm{font-size:24px;font-weight:800;color:var(--text);}
.brand-nm span{color:#1a73e8;}
.hero{font-size:54px;font-weight:800;line-height:1.12;color:var(--text);margin-bottom:20px;animation:up 0.8s 0.1s ease both;}
.hero .gr{background:linear-gradient(135deg,#1a73e8,#34a853);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{font-size:17px;color:var(--muted);line-height:1.65;max-width:420px;margin-bottom:50px;animation:up 0.8s 0.2s ease both;}
.pills{display:flex;gap:12px;flex-wrap:wrap;animation:up 0.8s 0.3s ease both;}
.pill{padding:8px 16px;border-radius:30px;border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--muted);background:rgba(255,255,255,0.03);}
@keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* Right */
.right{width:480px;background:rgba(15,19,32,0.85);backdrop-filter:blur(40px);border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:48px;position:relative;z-index:1;}
.box{width:100%;max-width:360px;animation:up 0.7s 0.1s ease both;}
.box-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
.box-sub{font-size:14px;color:var(--muted);margin-bottom:32px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px;}
.field input{width:100%;padding:13px 15px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s,background 0.2s;}
.field input:focus{border-color:#1a73e8;background:rgba(26,115,232,0.05);}
.field input::placeholder{color:rgba(255,255,255,0.18);}
.field.hidden{display:none;}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#1a73e8,#1254c0);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;transition:all 0.2s;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,115,232,0.4);}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.sep{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:12px;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
.btn-alt{width:100%;padding:13px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;font-size:13px;font-weight:600;color:var(--text);font-family:inherit;cursor:pointer;transition:all 0.2s;}
.btn-alt:hover{background:rgba(255,255,255,0.08);}
.msg{padding:11px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-top:14px;display:none;}
.msg.err{background:rgba(234,67,53,0.1);border:1px solid rgba(234,67,53,0.25);color:#ff6b6b;}
.msg.ok{background:rgba(52,168,83,0.1);border:1px solid rgba(52,168,83,0.25);color:#4caf50;}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid"></div>

<div class="left">
  <div class="brand">
    <div class="brand-ic">📊</div>
    <span class="brand-nm">Sales<span>BI</span></span>
  </div>
  <h1 class="hero">Your data.<br>Your <span class="gr">insights.</span></h1>
  <p class="sub">Upload any sales dataset and instantly see beautiful analytics, charts, and your full history — all in one place.</p>
  <div class="pills">
    <span class="pill">📈 Instant Charts</span>
    <span class="pill">📦 Product Analysis</span>
    <span class="pill">📥 Export PDF & Excel</span>
    <span class="pill">🗂️ Upload History</span>
  </div>
</div>

<div class="right">
  <div class="box">
    <h2 class="box-title" id="ttl">Welcome back</h2>
    <p class="box-sub" id="sub">Sign in to your SalesBI account</p>
    <div class="field hidden" id="nameF">
      <label>Full Name</label>
      <input type="text" id="fname" placeholder="Your full name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••">
    </div>
    <button class="btn-main" id="mainBtn" onclick="submit()">Sign In</button>
    <div class="msg" id="msg"></div>
    <div class="sep">or</div>
    <button class="btn-alt" onclick="toggle()">Create a new account</button>
  </div>
</div>

<script>
let mode = 'login';
function toggle() {
  mode = mode === 'login' ? 'register' : 'login';
  const r = mode === 'register';
  document.getElementById('nameF').classList.toggle('hidden', !r);
  document.getElementById('ttl').textContent = r ? 'Create account' : 'Welcome back';
  document.getElementById('sub').textContent = r ? 'Join SalesBI for free' : 'Sign in to your SalesBI account';
  document.getElementById('mainBtn').textContent = r ? 'Create Account' : 'Sign In';
  document.querySelector('.btn-alt').textContent = r ? 'Already have an account? Sign in' : 'Create a new account';
  showMsg('','');
}
function showMsg(t, type) {
  const el = document.getElementById('msg');
  el.textContent = t; el.className = 'msg ' + type;
  el.style.display = t ? 'block' : 'none';
}
async function submit() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  const fname = document.getElementById('fname').value.trim();
  if (!email || !pass) { showMsg('Please fill in all fields.', 'err'); return; }
  const btn = document.getElementById('mainBtn');
  btn.disabled = true; btn.textContent = 'Please wait...';
  try {
    if (mode === 'register') {
      const r = await fetch('/api/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:email.split('@')[0],email,password:pass,fullname:fname})});
      const d = await r.json();
      if (d.success) { showMsg('Account created! Signing you in...', 'ok'); setTimeout(toggle, 1000); }
      else showMsg(d.error || 'Registration failed.', 'err');
    } else {
      const r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username:email,password:pass})});
      const d = await r.json();
      if (d.success) { showMsg('Welcome! Redirecting...', 'ok'); setTimeout(() => window.location.href = '/dashboard', 700); }
      else showMsg(d.error || 'Invalid credentials.', 'err');
    }
  } catch(e) { showMsg('Connection error. Try again.', 'err'); }
  finally { btn.disabled = false; btn.textContent = mode === 'login' ? 'Sign In' : 'Create Account'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
